name: Unit Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm test -- --coverage --watchAll=false --forceExit --passWithNoTests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          VITE_API_KEY: ci-placeholder
          VITE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_PROJECT_ID: ci-placeholder
          VITE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_MESSAGING_SENDER_ID: "000000000000"
          VITE_APP_ID: "1:000000000000:web:ci"
          VITE_AI_AGENT_URL: http://localhost:8000
          VITE_AI_AGENT_API_KEY: ci-placeholder
