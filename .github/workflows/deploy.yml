name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      VITE_API_KEY: ${{ secrets.VITE_API_KEY || 'ci-placeholder' }}
      VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
      VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID || 'ci-placeholder' }}
      VITE_STORAGE_BUCKET: ${{ secrets.VITE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
      VITE_MESSAGING_SENDER_ID: ${{ secrets.VITE_MESSAGING_SENDER_ID || '000000000000' }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID || '1:000000000000:web:ci' }}
      VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME || 'ci-placeholder' }}
      VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET || 'ci-placeholder' }}
      VITE_AI_AGENT_URL: ${{ secrets.VITE_AI_AGENT_URL || 'http://localhost:8000' }}
      VITE_AI_AGENT_API_KEY: ${{ secrets.VITE_AI_AGENT_API_KEY || 'ci-placeholder' }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --watchAll=false --forceExit --passWithNoTests

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACCREDITEX }}
          channelId: live
          projectId: accreditex-79c08
