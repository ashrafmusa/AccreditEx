name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run E2E tests nightly
    - cron: "0 2 * * *"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          VITE_API_KEY: ci-placeholder
          VITE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_PROJECT_ID: ci-placeholder
          VITE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_MESSAGING_SENDER_ID: "000000000000"
          VITE_APP_ID: "1:000000000000:web:ci"
          VITE_AI_AGENT_URL: http://localhost:8000
          VITE_AI_AGENT_API_KEY: ci-placeholder

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ E2E tests passed successfully'
            })
        continue-on-error: true
