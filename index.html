    <style>
      :root {
        --brand-primary-color: #4f46e5;
        --color-surface: #ffffff;
        --color-background: #f8fafc;
        --color-border: #e2e8f0;
        --color-text-primary: #0f172a;
        --color-text-secondary: #64748b;

        /* Dark mode colors */
        --dark-color-surface: #1e293b;
        --dark-color-background: #020617;
        --dark-color-border: #334155;
        --dark-color-text-primary: #e2e8f0;
        --dark-color-text-secondary: #94a3b8;
      }
      .dark {
        --color-surface: var(--dark-color-surface);
        --color-background: var(--dark-color-background);
        --color-border: var(--dark-color-border);
        --color-text-primary: var(--dark-color-text-primary);
        --color-text-secondary: var(--dark-color-text-secondary);
      }
      body {
        background-color: var(--color-background);
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: var(--dark-color-background);
        color: var(--dark-color-text-primary);
      }
      /* Simple CSS for Collapsible Trigger Icon */
      [data-state='open'] > .collapsible-chevron {
        transform: rotate(180deg);
      }
      .collapsible-chevron {
        transition: transform 0.2s ease-in-out;
      }

      /* Simple animations */
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .modal-enter { animation: fadeIn 0.2s ease-out; }
      .modal-content-enter { animation: scaleIn 0.2s ease-out; }
      .page-enter-active { animation: fadeInUp 0.3s ease-out; }
      .dot-grid { background-image: radial-gradient(circle at 1px 1px, #cbd5e1 1px, transparent 0); background-size: 20px 20px; }
      .dark .dot-grid { background-image: radial-gradient(circle at 1px 1px, #475569 1px, transparent 0); }
      .dark-prose { color: #d1d5db; }
      .dark-prose h1, .dark-prose h2, .dark-prose h3, .dark-prose h4 { color: #f9fafb; }
      .dark-prose a { color: #818cf8; }
      .dark-prose strong { color: #f9fafb; }
      .dark-prose blockquote { border-color: #4b5563; color: #d1d5db; }
    </style>
</head>
<body>
    <div id="root">
      <!-- Inline loading skeleton — gives browser immediate FCP while JS loads -->
      <div id="app-skeleton" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--color-background);font-family:system-ui,-apple-system,sans-serif;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="animation:pulse 2s ease-in-out infinite;">
          <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 7L12 12L22 7" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 22V12" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="margin-top:16px;font-size:1.875rem;font-weight:700;animation:pulse 2s ease-in-out infinite;">
          <span style="color:var(--color-text-primary);">Accredit</span><span style="color:#4f46e5;">Ex</span>
        </div>
        <div style="margin-top:24px;width:200px;height:4px;background:#e2e8f0;border-radius:9999px;overflow:hidden;">
          <div style="width:100%;height:100%;background:linear-gradient(90deg,#4f46e5 0%,#818cf8 50%,#4f46e5 100%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:9999px;"></div>
        </div>
        <style>
          @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
          @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
          @media(prefers-color-scheme:dark){#app-skeleton{background:#020617!important}#app-skeleton span:first-child{color:#e2e8f0!important}#app-skeleton>div:last-of-type>div{background:#334155!important}}
        </style>
      </div>
    </div>
    <noscript>
      <div style="text-align:center;padding:4rem 2rem;font-family:system-ui,sans-serif;color:#334155;">
        <h1 style="font-size:1.5rem;margin-bottom:1rem;">AccreditEx requires JavaScript</h1>
        <p>Please enable JavaScript in your browser to use AccreditEx Healthcare Accreditation Management Platform.</p>
      </div>
    </noscript>
    <script type="module" src="/src/index.tsx"></script>
    <script>
        // Register smart service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                // Clean up old caches first
                const cacheNames = await caches.keys();
                for (let cacheName of cacheNames) {
                    if (cacheName !== 'accreditex-cache-v4') {
                        await caches.delete(cacheName);
                        console.log('Deleted old cache:', cacheName);
                    }
                }
                
                // Register new service worker
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('Service Worker registered:', registration);
                }).catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
            });
        }
    </script>
</body>
